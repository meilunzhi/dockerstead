# Walle - 瓦力DevOps平台
services:
  walle-nginx:
    image: alenx/walle-web:2.1
    container_name: walle-nginx
    hostname: nginx-web
    ports:
      - "${WALLE_HOST_PORT}:80"
    depends_on:
      - walle-python
    networks:
      - walle-net
    restart: always

  walle-python:
    image: alenx/walle-python:2.1
    container_name: walle-python
    hostname: walle-python
    env_file:
      - ./walle.env
    volumes:
      - ${WALLE_CODEBASE_DIR}:/tmp/walle/codebase/
      - ${WALLE_LOG_DIR}:/opt/walle-web/logs/
      - ${WALLE_SSH_DIR}:/root/.ssh/
    command: bash -c "cd /opt/walle_home/ && /bin/bash admin.sh migration && python waller.py"
    expose:
      - "5000"
    depends_on:
      - walle-mysql
    networks:
      - walle-net
    restart: always

  walle-mysql:
    image: mysql:${WALLE_MYSQL_VERSION}
    container_name: walle-mysql
    hostname: walle-mysql
    env_file:
      - ./walle.env
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "${WALLE_MYSQL_PORT}:3306"
    expose:
      - "3306"
    volumes:
      - ${WALLE_MYSQL_DATA_DIR}:/var/lib/mysql
    networks:
      - walle-net
    restart: always

networks:
  walle-net:
    driver: bridge
