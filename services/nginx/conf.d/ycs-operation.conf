server {
    server_name  docker-api.ycs-operation.testing;
    listen  80;
    listen 443 ssl;

    root   /www/Code/api/Ycs-Operation/public;
    index  index.php index.html index.htm;
    charset utf8;

    client_max_body_size 100M;
    access_log /dev/null;
    error_log  /var/log/nginx/nginx.operation.error.log  warn;
    error_page   500 502 503 504  /50x.html;

    ssl_certificate /ssl/localhost/localhost.crt;
    ssl_certificate_key /ssl/localhost/localhost.key;

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # 隐藏版本号
    server_tokens off;
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

     location / {
        try_files $uri $uri/ /index.php?$query_string;
     }


    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt  {
        access_log off;
        log_not_found off;
    }

    location ~ [^/]\.php(/|$) {
        fastcgi_pass   php74:9000;
        include        fastcgi-php.conf;
        include        fastcgi_params;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

