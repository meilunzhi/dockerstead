  go:
    build:
      context: ./services/go
      args:
        GO_VERSION: ${GO_VERSION}
        TZ: "$TZ"
        GOPROXY: "${GO_PROXY}"
    container_name: go
    expose:
      - "9100"
    ports:
      - "${GO_HOST_PORT}:9100"
    volumes:
      - ${SOURCE_DIR}:/www/:rw
      - ${GO_APP_DIR}:/www/goapp/:rw
      - ${GO_LOG_DIR}:/var/log/go/:rw
    working_dir: /www
    stdin_open: true
    tty: true
    restart: always
    networks:
      - default
    depends_on:
      - nginx

